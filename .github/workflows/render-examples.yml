name: Render examples

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python - <<'PY'
          import weasyprint
          print(weasyprint.__version__)
          assert weasyprint.__version__ == '68.1'
          PY

      - name: Generate weekly GitHub trending magazine
        run: |
          mkdir -p dist
          python scripts/generate_github_trending_magazine.py \
            --period week \
            --screen-output examples/github-trending-magazine.html \
            --print-output examples/github-trending-magazine-print.html \
            --data-output examples/github-trending-magazine-data.json \
            --pdf-output dist/github-trending-magazine-weekly.pdf

      - name: Render sample PDFs
        run: |
          weasyprint-flexoki examples/article-light.html dist/article-light.pdf
          weasyprint-flexoki examples/article-dark.html dist/article-dark.pdf
          weasyprint-flexoki examples/clinical-brief.md dist/clinical-brief.pdf
          weasyprint-flexoki examples/clinical-brief.md dist/clinical-brief-terminal.pdf --theme terminal --title "Clinical Brief"
          weasyprint-flexoki examples/impeccable-design-notes.md dist/impeccable-design-notes.pdf --theme impeccable --title "Impeccable Design Notes"
          weasyprint-flexoki src/weasyprint_flexoki/templates/letter.html.j2 dist/letter.pdf --context examples/letter-context.json
          weasyprint-flexoki src/weasyprint_flexoki/templates/report.html.j2 dist/report.pdf --context examples/report-context.json
          weasyprint-flexoki src/weasyprint_flexoki/templates/report.html.j2 dist/report-indie-web.pdf --context examples/report-context.json --theme indie-web --title "Quarterly Operations Report"
          weasyprint-flexoki src/weasyprint_flexoki/templates/report.html.j2 dist/report-impeccable.pdf --context examples/report-context.json --theme impeccable --title "Quarterly Operations Report"

      - name: Upload rendered PDFs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-pdfs
          path: dist/*.pdf
