<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>GitHub Trending Magazine, Day Issue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #f2f2ee;
        --paper-2: #e9e9e4;
        --ink: #101010;
        --ink-soft: rgba(16, 16, 16, 0.86);
        --ink-faint: rgba(16, 16, 16, 0.34);
        --night: #080808;
        --night-2: #111111;
        --night-ink: rgba(255, 255, 255, 0.94);
        --night-soft: rgba(255, 255, 255, 0.86);
        --night-faint: rgba(255, 255, 255, 0.14);
        --rule-light: rgba(16, 16, 16, 0.12);
        --rule-dark: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        font-family: "Source Serif 4", Georgia, serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .viewport {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
      }

      .track {
        display: flex;
        width: calc(100vw * 14);
        height: 100vh;
        transform: translate3d(0, 0, 0);
        transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      .page {
        position: relative;
        flex: 0 0 100vw;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .page.light {
        background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
        color: var(--ink);
      }

      .page.dark {
        background: linear-gradient(180deg, var(--night) 0%, var(--night-2) 100%);
        color: var(--night-ink);
      }

      .page-inner {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 5vh 4vw 10vh;
      }

      .cover,
      .back-cover {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .cover-top,
      .cover-bottom,
      .back-cover-top,
      .back-cover-bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 2vw;
      }

      .kicker,
      .cover-meta,
      .mini-meta,
      .repo-meta,
      .dot-label,
      .back-note {
        font-family: "IBM Plex Mono", monospace;
        font-size: max(12px, 0.95vw);
        line-height: 1.5;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .page.light .kicker,
      .page.light .cover-meta,
      .page.light .mini-meta,
      .page.light .repo-meta,
      .page.light .back-note,
      .page.light .dot-label {
        color: rgba(16, 16, 16, 0.76);
      }

      .page.dark .kicker,
      .page.dark .cover-meta,
      .page.dark .mini-meta,
      .page.dark .repo-meta,
      .page.dark .back-note,
      .page.dark .dot-label {
        color: rgba(255, 255, 255, 0.78);
      }

      .cover-title,
      .back-title {
        margin: 0;
        max-width: 72vw;
        font-family: "Playfair Display", serif;
        font-size: 10.5vw;
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      .cover-deck,
      .back-deck {
        max-width: 48vw;
        margin: 2.5vh 0 0;
        font-size: max(18px, 1.65vw);
        line-height: 1.45;
      }

      .cover-grid {
        display: grid;
        grid-template-columns: 55fr 45fr;
        gap: 3vw;
        width: 100%;
        height: 100%;
      }

      .cover-aside {
        align-self: end;
        padding-bottom: 2vh;
      }

      .spread {
        display: grid;
        grid-template-columns: 55fr 45fr;
        width: 100%;
        height: 100%;
        gap: 2.6vw;
      }

      .spread-left,
      .spread-right {
        position: relative;
        min-width: 0;
      }

      .spread-left {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-right: 1vw;
      }

      .spread-right {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-left: 2.2vw;
      }

      .page.light .spread-right {
        border-left: 1px solid var(--rule-light);
      }

      .page.dark .spread-right {
        border-left: 1px solid var(--rule-dark);
      }

      .rank-ghost {
        position: absolute;
        top: -1.5vh;
        left: -0.2vw;
        z-index: 0;
        font-family: "Playfair Display", serif;
        font-size: 24vw;
        line-height: 0.8;
        letter-spacing: -0.08em;
        pointer-events: none;
        user-select: none;
      }

      .page.light .rank-ghost {
        color: rgba(16, 16, 16, 0.08);
      }

      .page.dark .rank-ghost {
        color: rgba(255, 255, 255, 0.08);
      }

      .left-content,
      .right-content {
        position: relative;
        z-index: 1;
      }

      .left-content {
        padding-top: 9vh;
      }

      .category-tag {
        display: inline-block;
        margin-bottom: 2.2vh;
        padding-bottom: 0.5vh;
        border-bottom: 1px solid currentColor;
      }

      .headline {
        margin: 0 0 2.6vh;
        font-family: "Playfair Display", serif;
        font-size: 5.5vw;
        line-height: 0.96;
        letter-spacing: -0.045em;
      }

      .repo-path {
        margin: 0 0 2vh;
        font-family: "IBM Plex Mono", monospace;
        font-size: max(18px, 1.35vw);
        line-height: 1.45;
        word-break: break-word;
      }

      .description {
        max-width: 40vw;
        margin: 0 0 2.4vh;
        font-size: max(17px, 1.5vw);
        line-height: 1.55;
      }

      .page.light .description {
        color: rgba(16, 16, 16, 0.9);
      }

      .page.dark .description {
        color: rgba(255, 255, 255, 0.88);
      }

      .star-count {
        margin: 0 0 1.4vh;
        font-family: "Playfair Display", serif;
        font-size: 6.8vw;
        line-height: 0.88;
        letter-spacing: -0.05em;
      }

      .stat-line {
        display: flex;
        flex-wrap: wrap;
        gap: 1vw 1.4vw;
        margin-bottom: 3vh;
      }

      .stat-pill {
        display: inline-flex;
        align-items: center;
        min-height: 2.7em;
        padding: 0.25em 0;
      }

      .callout {
        margin-top: 1vh;
        padding: 2vh 1.4vw 2.2vh 1.5vw;
        border-left: 4px solid currentColor;
      }

      .page.light .callout {
        background: rgba(16, 16, 16, 0.06);
      }

      .page.dark .callout {
        background: rgba(255, 255, 255, 0.09);
      }

      .callout-label {
        display: block;
        margin-bottom: 1.2vh;
      }

      .callout p {
        margin: 0;
        font-size: max(17px, 1.5vw);
        line-height: 1.58;
      }

      .page.light .callout p {
        color: rgba(16, 16, 16, 0.82);
      }

      .page.dark .callout p {
        color: rgba(255, 255, 255, 0.8);
      }

      .dots {
        position: absolute;
        left: 4vw;
        right: 4vw;
        bottom: 3.2vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.55vw;
        z-index: 20;
      }

      .dot {
        width: 0.72vw;
        height: 0.72vw;
        min-width: 10px;
        min-height: 10px;
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
        padding: 0;
      }

      .dot.active {
        transform: scale(1.45);
        background: rgba(255, 255, 255, 0.92);
      }

      .page.light ~ .dots .dot {
        background: rgba(255, 255, 255, 0.22);
      }

      .nav-hint {
        position: absolute;
        right: 4vw;
        bottom: 3.2vh;
        z-index: 20;
      }

      @media (max-width: 980px) {
        .cover-grid,
        .spread {
          grid-template-columns: 1fr;
          gap: 1.8vh;
        }

        .spread-right {
          border-left: none !important;
          padding-left: 0;
        }

        .left-content {
          padding-top: 6vh;
        }

        .headline {
          font-size: 8vw;
        }

        .star-count {
          font-size: 12vw;
        }

        .cover-title,
        .back-title {
          font-size: 15vw;
          max-width: 88vw;
        }

        .description,
        .why-note,
        .callout p,
        .cover-deck,
        .back-deck {
          max-width: none;
          font-size: max(17px, 4vw);
        }

        .rank-ghost {
          font-size: 34vw;
        }

        .dots {
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <div class="track" id="track"></div>
      <div class="dots" id="dots" aria-label="Page navigation"></div>
      <div class="nav-hint mini-meta">← → wheel swipe</div>
    </div>

    <script>
      const ISSUE_WINDOW = 'DAY';
      const ISSUE_DATE = '16 Apr 2026';
      const TOTAL_PAGES = 14;

      const repos = [
        {
          rank: 1,
          owner: 'forrestchang',
          repo: 'andrej-karpathy-skills',
          category: 'Agent discipline',
          headline: 'The hottest repo is a reminder that prompting is still product design.',
          description: 'A single CLAUDE.md file to improve Claude Code behavior, derived from Andrej Karpathy\'s observations on LLM coding pitfalls.',
          stars: '46,099',
          trend: '9,646 stars today',
          language: 'Prompting / Docs',

        },
        {
          rank: 2,
          owner: 'pascalorg',
          repo: 'editor',

          headline: 'A trending 3D editor is really a bet on collaborative visual thinking.',
          description: 'Create and share 3D architectural projects.',
          stars: '12,988',
          trend: '1,391 stars today',
          language: 'TypeScript',
          note: 'Even if you never touch architecture tooling, pay attention to interaction patterns here. This is useful as inspiration for how complex information can become more navigable when users manipulate space instead of reading lists.'
        },
        {
          rank: 3,
          owner: 'thedotmack',
          repo: 'claude-mem',
          category: 'Memory systems',
          headline: 'The memory layer is becoming the product, not just a feature bolted onto agents.',
          description: 'A Claude Code plugin that automatically captures everything Claude does during your coding sessions, compresses it with AI, and injects relevant context back into future sessions.',
          stars: '58,517',
          trend: '2,305 stars today',
          language: 'TypeScript',
          note: 'This is directly relevant to how you think about Axon. Study it for memory strategy, retrieval timing, and compression patterns, but keep your own bar higher around signal, privacy, and what deserves to persist.'
        },
        {
          rank: 4,
          owner: 'Lordog',
          repo: 'dive-into-llms',
          category: 'Learning stack',
          headline: 'Hands-on learning repos still win because they compress confusion into sequence.',
          description: '《动手学大模型Dive into LLMs》系列编程实践教程',
          stars: '30,205',
          trend: '941 stars today',
          language: 'Jupyter Notebook',
          note: 'Think of this as curriculum architecture. The useful question for you is not “should I read it all?” but “which sections best sharpen my judgment about model behavior, evaluation, and real-world failure modes?”'
        },
        {
          rank: 5,
          owner: 'virattt',
          repo: 'ai-hedge-fund',
          category: 'Multi-agent finance',
          headline: 'Agent collectives keep getting packaged as firms, desks, and teams because the metaphor works.',
          description: 'An AI Hedge Fund Team',
          stars: '55,443',
          trend: '1,058 stars today',
          language: 'Python',
          note: 'You do not need the finance wrapper to get value from this. What matters is the orchestration pattern: role split, decision checkpoints, and how multiple narrow agents beat one vague generalist when the task has structure.'
        },
        {
          rank: 6,
          owner: 'chrislgarry',
          repo: 'Apollo-11',
          category: 'Engineering history',
          headline: 'Old code trends because constraint, clarity, and mission focus still feel radical.',
          description: 'Original Apollo 11 Guidance Computer (AGC) source code for the command and lunar modules.',
          stars: '66,918',
          trend: '606 stars today',
          language: 'Assembly',
          note: 'This is not about nostalgia. Use it as a reset on elegance under pressure. When your own systems get bloated, repos like this remind you that sharp constraints often produce cleaner thinking.'
        },
        {
          rank: 7,
          owner: 'obra',
          repo: 'superpowers',
          category: 'Agent methodology',
          headline: 'Process repos trend when people want reliable output more than raw model magic.',
          description: 'An agentic skills framework & software development methodology that works.',
          stars: '155,226',
          trend: '2,055 stars today',
          language: 'Shell',
          note: 'This is worth reading as operating philosophy. For your work, the key filter is whether a method actually improves repeatability, review quality, and handoff clarity, not whether it sounds sophisticated.'
        },
        {
          rank: 8,
          owner: 'jamiepine',
          repo: 'voicebox',
          category: 'Voice tooling',
          headline: 'Voice is becoming another editable medium, not just an output channel.',
          description: 'The open-source voice synthesis studio',
          stars: '18,626',
          trend: '1,062 stars today',
          language: 'TypeScript',
          note: 'This matters if you want more expressive delivery, patient-friendly summaries, or storytelling outputs. Think of it as a media workflow tool, not just an AI novelty, especially when tone changes comprehension.'
        },
        {
          rank: 9,
          owner: 'public-apis',
          repo: 'public-apis',
          category: 'Sourcebook',
          headline: 'A giant API index trends because builders still want leverage more than originality theatre.',
          description: 'A collective list of free APIs',
          stars: '423,911',
          trend: '950 stars today',
          language: 'Python',
          note: 'For you, this is not something to browse casually. Use it when a project is bottlenecked by data or utility access and you need a fast shortlist of external services before committing to an integration path.'
        },
        {
          rank: 10,
          owner: 'vercel-labs',
          repo: 'open-agents',
          category: 'Cloud agents',
          headline: 'The platform fight is shifting from chat wrappers to deployable agent substrates.',
          description: 'An open source template for building cloud agents.',
          stars: '2,900',
          trend: '915 stars today',
          language: 'TypeScript',
          note: 'Read this as infrastructure thinking. If you ever want agent behavior to leave the notebook and become a durable product surface, the important pieces are session model, tool plumbing, and control over execution boundaries.'
        },
        {
          rank: 11,
          owner: 'lsdefine',
          repo: 'GenericAgent',
          category: 'Self-improving agents',
          headline: 'Self-evolving agent repos trend because autonomy still feels like the frontier story.',
          description: 'Self-evolving agent: grows skill tree from a 3.3K-line seed, achieving full system control with 6x less token consumption.',
          stars: '2,329',
          trend: '446 stars today',
          language: 'Python',
          note: 'Treat this with curiosity and skepticism at the same time. The useful angle for your work is not uncontrolled autonomy, but the mechanisms for skill growth, compression, and scoped capability expansion.'
        },
        {
          rank: 12,
          owner: 'google',
          repo: 'magika',
          category: 'File intelligence',
          headline: 'Boring infrastructure becomes interesting again when it quietly removes friction everywhere.',
          description: 'Fast and accurate AI powered file content types detection',
          stars: '14,114',
          trend: '768 stars today',
          language: 'Python',
          note: 'This is the kind of repo that pays off in background reliability. Keep it in mind for any workflow that touches mixed documents, uploads, archives, or clinical files where quick type certainty prevents dumb downstream mistakes.'
        }
      ];

      const track = document.getElementById('track');
      const dots = document.getElementById('dots');
      let currentIndex = 0;
      let wheelLocked = false;
      let touchStartX = 0;
      let touchDeltaX = 0;

      function pageTheme(index) {
        if (index === 0 || index === TOTAL_PAGES - 1) return 'dark';
        return index % 2 === 0 ? 'dark' : 'light';
      }

      function coverMarkup() {
        return `
          <section class="page dark" data-page="1">
            <div class="page-inner cover">
              <div class="cover-top">
                <div class="kicker">GitHub Trends / ${ISSUE_WINDOW} Issue / ${ISSUE_DATE}</div>
                <div class="cover-meta">Monochrome issue / single HTML / no-scroll magazine</div>
              </div>
              <div class="cover-grid">
                <div>
                  <h1 class="cover-title">GitHub Trending Magazine</h1>
                  <p class="cover-deck">A full-bleed e-ink issue built as one horizontal HTML experience: 12 trending repos, editorial framing, and a practical note on how each one could matter to your work.</p>
                </div>
                <div class="cover-aside">
                  <div class="mini-meta">Page 01 / Cover</div>
                  <p class="cover-deck">Pages 02–13 alternate light and dark. Page 14 closes the issue. Use arrow keys, swipe, wheel, or dots to move through it like a digital magazine instead of a scrolling feed.</p>
                </div>
              </div>
              <div class="cover-bottom">
                <div class="cover-meta">Fonts / Playfair Display, Source Serif 4, IBM Plex Mono</div>
                <div class="cover-meta">Focus / Agent tools, infrastructure, learning systems, interface ideas</div>
              </div>
            </div>
          </section>
        `;
      }

      function repoMarkup(repo, pageIndex) {
        const theme = pageTheme(pageIndex);
        return `
          <section class="page ${theme}" data-page="${pageIndex + 1}">
            <div class="page-inner">
              <div class="spread">
                <div class="spread-left">
                  <div class="rank-ghost">${String(repo.rank).padStart(2, '0')}</div>
                  <div class="left-content">
                    <div class="kicker category-tag">${repo.category}</div>
                    <h2 class="headline">${repo.headline}</h2>
                    <p class="repo-path">${repo.owner}/${repo.repo}</p>
                    <p class="description">${repo.description}</p>
                  </div>
                </div>
                <div class="spread-right">
                  <div class="right-content">
                    <div class="mini-meta">Page ${String(pageIndex + 1).padStart(2, '0')} / Rank ${String(repo.rank).padStart(2, '0')}</div>
                    <div class="star-count">${repo.stars}</div>
                    <div class="stat-line repo-meta">
                      <span class="stat-pill">${repo.language}</span>
                      <span class="stat-pill">${repo.trend}</span>
                    </div>
                    <div class="callout">
                      <span class="callout-label mini-meta">How to use this</span>
                      <p>${repo.note}</p>
                    </div>
                  </div>
                  <div class="repo-meta">github.com/${repo.owner}/${repo.repo}</div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function backCoverMarkup() {
        return `
          <section class="page dark" data-page="14">
            <div class="page-inner back-cover">
              <div class="back-cover-top">
                <div class="kicker">Back cover / Day issue / ${ISSUE_DATE}</div>
                <div class="cover-meta">12 repos / 14 pages / monochrome only</div>
              </div>
              <div>
                <h2 class="back-title">What matters is the pattern, not the hype.</h2>
                <p class="back-deck">If a repo stays with you after the page turn, translate it into one sentence: what system behavior, workflow pattern, or design instinct does it sharpen for your own work?</p>
              </div>
              <div class="back-cover-bottom">
                <div class="back-note">Next issue / switch ISSUE_WINDOW to WEEK and refresh the repo list.</div>
                <div class="back-note">Built as one edge-to-edge HTML magazine with transform pagination.</div>
              </div>
            </div>
          </section>
        `;
      }

      function buildMagazine() {
        const pages = [coverMarkup()];
        repos.forEach((repo, idx) => pages.push(repoMarkup(repo, idx + 1)));
        pages.push(backCoverMarkup());
        track.innerHTML = pages.join('');

        dots.innerHTML = Array.from({ length: TOTAL_PAGES }, (_, idx) => {
          const label = idx === 0 ? 'Cover' : idx === TOTAL_PAGES - 1 ? 'Back cover' : `Page ${idx + 1}`;
          return `<button class="dot" type="button" aria-label="${label}" data-index="${idx}"></button>`;
        }).join('');

        dots.querySelectorAll('.dot').forEach((dot) => {
          dot.addEventListener('click', () => goToPage(Number(dot.dataset.index)));
        });
      }

      function updateDots() {
        dots.querySelectorAll('.dot').forEach((dot, idx) => {
          dot.classList.toggle('active', idx === currentIndex);
        });
      }

      function pageFromHash() {
        const match = window.location.hash.match(/page-(\d+)/i);
        if (!match) return 0;
        return Math.max(0, Math.min(TOTAL_PAGES - 1, Number(match[1]) - 1));
      }

      function goToPage(index, { updateHash = true } = {}) {
        currentIndex = Math.max(0, Math.min(TOTAL_PAGES - 1, index));
        track.style.transform = `translate3d(-${currentIndex * 100}vw, 0, 0)`;
        updateDots();
        if (updateHash) {
          history.replaceState(null, '', `#page-${currentIndex + 1}`);
        }
      }

      function nextPage() {
        goToPage(currentIndex + 1);
      }

      function prevPage() {
        goToPage(currentIndex - 1);
      }

      window.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowRight') nextPage();
        if (event.key === 'ArrowLeft') prevPage();
      });

      window.addEventListener('wheel', (event) => {
        event.preventDefault();
        if (wheelLocked) return;
        wheelLocked = true;
        if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
          event.deltaY > 0 ? nextPage() : prevPage();
        } else {
          event.deltaX > 0 ? nextPage() : prevPage();
        }
        setTimeout(() => {
          wheelLocked = false;
        }, 520);
      }, { passive: false });

      window.addEventListener('touchstart', (event) => {
        touchStartX = event.touches[0].clientX;
        touchDeltaX = 0;
      }, { passive: true });

      window.addEventListener('touchmove', (event) => {
        touchDeltaX = event.touches[0].clientX - touchStartX;
      }, { passive: true });

      window.addEventListener('touchend', () => {
        if (Math.abs(touchDeltaX) < 40) return;
        if (touchDeltaX < 0) nextPage();
        if (touchDeltaX > 0) prevPage();
      });

      window.addEventListener('hashchange', () => {
        goToPage(pageFromHash(), { updateHash: false });
      });

      buildMagazine();
      goToPage(pageFromHash(), { updateHash: false });
    </script>
  </body>
</html>
